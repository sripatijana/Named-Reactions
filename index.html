document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

->\n      <div style=\"height:max(env(safe-area-inset-top),14px);flex:none;\"><\u002Fdiv>\n\n      <!-- ============ DIRECTORY TAB ============ -->\n      <sc-if value=\"{{ showDirectory }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1;min-height:0;display:flex;flex-direction:column;\">\n        <div style=\"flex:none;padding:6px 22px 14px;\">\n          <div style=\"font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:oklch(0.47 0.11 25);margin-bottom:8px;\">Organic Chemistry<\u002Fdiv>\n          <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:30px;line-height:1.02;color:#211d18;letter-spacing:-0.01em;\">Named Reactions<\u002Fdiv>\n          <div style=\"margin-top:7px;font:400 12.5px/1.4 'IBM Plex Mono',monospace;color:#8a8378;\">{{ total }} reactions · sorted A–Z<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;flex:1;min-height:0;\">\n          <div class=\"nr-scroll\" ref=\"{{ scrollRef }}\" style=\"position:relative;height:100%;overflow-y:auto;padding-bottom:24px;\">\n            <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"4\">\n              <div id=\"{{ g.id }}\" style=\"position:relative;\">\n                <div style=\"position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:10px;padding:6px 22px;background:linear-gradient(#f5f2ea 70%,rgba(245,242,234,0));backdrop-filter:blur(2px);\">\n                  <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:15px;color:oklch(0.47 0.11 25);width:16px;\">{{ g.letter }}<\u002Fdiv>\n                  <div style=\"flex:1;height:1px;background:rgba(33,29,24,.10);\"><\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ g.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ item.onOpen }}\" style=\"display:flex;align-items:center;gap:6px;padding:11px 16px 11px 22px;cursor:pointer;border-bottom:1px solid rgba(33,29,24,.055);\" style-active=\"background:rgba(33,29,24,.03);\">\n                    <div style=\"flex:1;min-width:0;\">\n                      <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:16.5px;line-height:1.15;color:#211d18;\">{{ item.name }}<\u002Fdiv>\n                      <div style=\"margin-top:3px;font:400 12.5px/1.35 -apple-system,system-ui;color:#7c766b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ item.summary }}<\u002Fdiv>\n                      <div style=\"margin-top:6px;display:flex;align-items:center;gap:8px;\">\n                        <span style=\"font:500 9.5px/1 'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase;padding:3px 6px;border-radius:4px;background:{{ item.catBg }};color:{{ item.catColor }};\">{{ item.catLabel }}<\u002Fspan>\n                        <span style=\"font:400 11px/1 'IBM Plex Mono',monospace;color:#a49d90;\">{{ item.year }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div onclick=\"{{ item.onToggleFav }}\" style=\"flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:19px;color:{{ item.starColor }};cursor:pointer;\">{{ item.favLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Alpha rail -->\n          <div style=\"position:absolute;top:0;right:2px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0 3px;z-index:3;pointer-events:auto;\">\n            <sc-for list=\"{{ alphabet }}\" as=\"a\" hint-placeholder-count=\"20\">\n              <div onclick=\"{{ a.onJump }}\" style=\"font:600 9.5px/1 'IBM Plex Mono',monospace;color:oklch(0.55 0.09 25);padding:1.5px 3px;cursor:pointer;\">{{ a.letter }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ FAVORITES TAB ============ -->\n      <sc-if value=\"{{ showFavorites }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;min-height:0;display:flex;flex-direction:column;\">\n        <div style=\"flex:none;padding:6px 22px 14px;\">\n          <div style=\"font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:oklch(0.47 0.11 25);margin-bottom:8px;\">Your Library<\u002Fdiv>\n          <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:30px;line-height:1.02;color:#211d18;letter-spacing:-0.01em;\">Saved<\u002Fdiv>\n          <div style=\"margin-top:7px;font:400 12.5px/1.4 'IBM Plex Mono',monospace;color:#8a8378;\">{{ favCountLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"nr-scroll\" style=\"flex:1;min-height:0;overflow-y:auto;padding-bottom:24px;\">\n          <sc-if value=\"{{ hasFavorites }}\" hint-placeholder-val=\"{{ false }}\">\n            <sc-for list=\"{{ favList }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ item.onOpen }}\" style=\"display:flex;align-items:center;gap:6px;padding:11px 16px 11px 22px;cursor:pointer;border-bottom:1px solid rgba(33,29,24,.055);\" style-active=\"background:rgba(33,29,24,.03);\">\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:16.5px;line-height:1.15;color:#211d18;\">{{ item.name }}<\u002Fdiv>\n                  <div style=\"margin-top:3px;font:400 12.5px/1.35 -apple-system,system-ui;color:#7c766b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ item.summary }}<\u002Fdiv>\n                  <div style=\"margin-top:6px;display:flex;align-items:center;gap:8px;\">\n                    <span style=\"font:500 9.5px/1 'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase;padding:3px 6px;border-radius:4px;background:{{ item.catBg }};color:{{ item.catColor }};\">{{ item.catLabel }}<\u002Fspan>\n                    <span style=\"font:400 11px/1 'IBM Plex Mono',monospace;color:#a49d90;\">{{ item.year }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div onclick=\"{{ item.onToggleFav }}\" style=\"flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:19px;color:{{ item.starColor }};cursor:pointer;\">{{ item.favLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noFavorites }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"padding:70px 40px;text-align:center;\">\n              <div style=\"font-size:34px;color:oklch(0.7 0.06 25);\">☆<\u002Fdiv>\n              <div style=\"margin-top:14px;font-family:'Spectral',serif;font-weight:500;font-size:18px;color:#211d18;\">No saved reactions yet<\u002Fdiv>\n              <div style=\"margin-top:8px;font:400 12.5px/1.5 -apple-system,system-ui;color:#8a8378;\">Tap the star on any reaction to keep it here for quick reference.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ EXPLORE TAB ============ -->\n      <sc-if value=\"{{ showExplore }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;min-height:0;display:flex;flex-direction:column;\">\n        <div style=\"flex:none;padding:6px 22px 12px;\">\n          <div style=\"font:600 11px/1 'IBM Plex Mono',monospace;letter-spacing:.16em;text-transform:uppercase;color:oklch(0.47 0.11 25);margin-bottom:8px;\">Study Lenses<\u002Fdiv>\n          <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:30px;line-height:1.02;color:#211d18;letter-spacing:-0.01em;\">Explore<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- segmented control -->\n        <div style=\"flex:none;padding:0 16px 12px;\">\n          <div style=\"display:flex;gap:3px;padding:3px;background:rgba(33,29,24,.06);border-radius:10px;\">\n            <div onclick=\"{{ segTimeline.onSel }}\" style=\"{{ segTimeline.style }}\">Timeline<\u002Fdiv>\n            <div onclick=\"{{ segCategory.onSel }}\" style=\"{{ segCategory.style }}\">Category<\u002Fdiv>\n            <div onclick=\"{{ segGroups.onSel }}\" style=\"{{ segGroups.style }}\">Groups<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"nr-scroll\" style=\"flex:1;min-height:0;overflow-y:auto;padding-bottom:24px;\">\n\n          <!-- TIMELINE -->\n          <sc-if value=\"{{ showTimeline }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"padding:0 22px 10px;font:400 12px/1.5 -apple-system,system-ui;color:#8a8378;\">Two centuries of discovery, {{ yearMin }}–{{ yearMax }}. Tap any reaction to open it.<\u002Fdiv>\n            <sc-for list=\"{{ eras }}\" as=\"era\" hint-placeholder-count=\"4\">\n              <div style=\"position:sticky;top:0;z-index:2;padding:12px 22px 7px;background:linear-gradient(#f5f2ea 72%,rgba(245,242,234,0));backdrop-filter:blur(2px);\">\n                <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:17px;color:#211d18;\">{{ era.title }}<\u002Fdiv>\n                <div style=\"margin-top:2px;font:500 10px/1 'IBM Plex Mono',monospace;letter-spacing:.06em;color:oklch(0.55 0.09 25);\">{{ era.range }} · {{ era.count }} reactions<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ era.items }}\" as=\"item\" hint-placeholder-count=\"5\">\n                <div onclick=\"{{ item.onOpen }}\" style=\"display:flex;align-items:center;gap:12px;padding:10px 22px;cursor:pointer;border-bottom:1px solid rgba(33,29,24,.055);\" style-active=\"background:rgba(33,29,24,.03);\">\n                  <div style=\"flex:none;width:40px;font:600 13px/1 'IBM Plex Mono',monospace;color:oklch(0.55 0.09 25);\">{{ item.year }}<\u002Fdiv>\n                  <span style=\"flex:none;width:7px;height:7px;border-radius:50%;background:{{ item.catColor }};\"><\u002Fspan>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:15.5px;line-height:1.15;color:#211d18;\">{{ item.name }}<\u002Fdiv>\n                    <div style=\"margin-top:2px;font:400 11.5px/1.3 -apple-system,system-ui;color:#8a8378;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ item.summary }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n\n          <!-- CATEGORY -->\n          <sc-if value=\"{{ showCategory }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 22px 10px;font:400 12px/1.5 -apple-system,system-ui;color:#8a8378;\">Grouped by mechanistic class — what kind of transformation each reaction performs.<\u002Fdiv>\n            <sc-for list=\"{{ catGroups }}\" as=\"cg\" hint-placeholder-count=\"6\">\n              <div style=\"position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:10px;padding:11px 22px 7px;background:linear-gradient(#f5f2ea 72%,rgba(245,242,234,0));backdrop-filter:blur(2px);\">\n                <span style=\"flex:none;width:9px;height:9px;border-radius:2px;background:{{ cg.color }};\"><\u002Fspan>\n                <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:16px;color:#211d18;\">{{ cg.label }}<\u002Fdiv>\n                <div style=\"font:500 10.5px/1 'IBM Plex Mono',monospace;color:#a49d90;\">{{ cg.count }}<\u002Fdiv>\n                <div style=\"flex:1;height:1px;background:rgba(33,29,24,.09);\"><\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ cg.items }}\" as=\"item\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ item.onOpen }}\" style=\"display:flex;align-items:center;gap:6px;padding:10px 16px 10px 22px;cursor:pointer;border-bottom:1px solid rgba(33,29,24,.055);\" style-active=\"background:rgba(33,29,24,.03);\">\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:15.5px;line-height:1.15;color:#211d18;\">{{ item.name }}<\u002Fdiv>\n                    <div style=\"margin-top:2px;font:400 11.5px/1.3 -apple-system,system-ui;color:#8a8378;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ item.summary }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:none;font:400 10.5px/1 'IBM Plex Mono',monospace;color:#a49d90;\">{{ item.year }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n\n          <!-- GROUPS (functional group) -->\n          <sc-if value=\"{{ showGroups }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 16px 10px;\">\n              <div style=\"display:flex;gap:3px;padding:3px;background:rgba(33,29,24,.06);border-radius:10px;\">\n                <div onclick=\"{{ dirFrom.onSel }}\" style=\"{{ dirFrom.style }}\">I have this ▸ convert it<\u002Fdiv>\n                <div onclick=\"{{ dirTo.onSel }}\" style=\"{{ dirTo.style }}\">I want this ▸ prepare it<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:9px;padding:0 4px;font:400 12px/1.5 -apple-system,system-ui;color:#8a8378;\">{{ fgHint }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-for list=\"{{ fgList }}\" as=\"fg\" hint-placeholder-count=\"8\">\n              <div style=\"margin:0 16px 9px;border:1px solid rgba(33,29,24,.1);border-radius:12px;overflow:hidden;background:#fff;\">\n                <div onclick=\"{{ fg.onToggle }}\" style=\"display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;\" style-active=\"background:rgba(33,29,24,.02);\">\n                  <span style=\"flex:none;width:9px;height:9px;border-radius:2px;background:{{ fg.color }};\"><\u002Fspan>\n g:.04em;padding:5px 8px;border-radius:6px;\">⤢ TAP TO ENLARGE<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ detail.noScheme }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"position:relative;width:100%;aspect-ratio:2/1;border-radius:12px;overflow:hidden;border:1px solid rgba(33,29,24,.12);background-color:#efece3;background-image:repeating-linear-gradient(135deg,rgba(33,29,24,.045) 0 10px,transparent 10px 20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;\">\n                <div style=\"width:34px;height:34px;border:1.5px solid rgba(33,29,24,.28);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(33,29,24,.42);font-size:16px;\">⌗<\u002Fdiv>\n                <div style=\"font:500 11px/1.4 'IBM Plex Mono',monospace;color:rgba(33,29,24,.5);text-align:center;padding:0 24px;\">reaction scheme — {{ detail.name }}<br><span style=\"color:rgba(33,29,24,.32);font-size:10px;\">add schemes/{{ detail.id }}.png<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- overview -->\n          <div style=\"margin-top:22px;font-family:'Spectral',serif;font-weight:400;font-size:15.5px;line-height:1.55;color:#33302a;\">{{ detail.overview }}<\u002Fdiv>\n\n          <!-- conditions -->\n          <div style=\"margin-top:26px;display:flex;align-items:center;gap:10px;\">\n            <div style=\"font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8378;\">Conditions<\u002Fdiv>\n            <div style=\"flex:1;height:1px;background:rgba(33,29,24,.1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;display:flex;flex-wrap:wrap;gap:7px;\">\n            <sc-for list=\"{{ detail.conditions }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <span style=\"font:500 12px/1.3 'IBM Plex Mono',monospace;color:#4a463f;background:#fff;border:1px solid rgba(33,29,24,.12);padding:6px 10px;border-radius:7px;\">{{ c }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- mechanism -->\n          <div style=\"margin-top:26px;display:flex;align-items:center;gap:10px;\">\n            <div style=\"font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8378;\">Mechanism<\u002Fdiv>\n            <div style=\"flex:1;height:1px;background:rgba(33,29,24,.1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:0;\">\n            <sc-for list=\"{{ detail.steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;gap:14px;padding-bottom:16px;position:relative;\">\n                <div style=\"flex:none;width:26px;height:26px;border-radius:50%;background:oklch(0.47 0.11 25);color:#fff;font:600 12px/1 'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center;z-index:2;\">{{ s.n }}<\u002Fdiv>\n                <div style=\"flex:1;font-family:'Spectral',serif;font-weight:400;font-size:14.5px;line-height:1.5;color:#33302a;padding-top:3px;\">{{ s.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- example -->\n          <div style=\"margin-top:6px;display:flex;align-items:center;gap:10px;\">\n            <div style=\"font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8378;\">Representative Example<\u002Fdiv>\n            <div style=\"flex:1;height:1px;background:rgba(33,29,24,.1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;padding:14px 16px;background:oklch(0.96 0.02 25);border-left:3px solid oklch(0.47 0.11 25);border-radius:0 8px 8px 0;font-family:'Spectral',serif;font-weight:400;font-size:14.5px;line-height:1.5;color:#3a3630;\">{{ detail.example }}<\u002Fdiv>\n\n          <!-- named after -->\n          <div style=\"margin-top:26px;display:flex;align-items:center;gap:10px;\">\n            <div style=\"font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8378;\">Named After<\u002Fdiv>\n            <div style=\"flex:1;height:1px;background:rgba(33,29,24,.1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;display:flex;gap:14px;align-items:flex-start;padding:16px;background:#fff;border:1px solid rgba(33,29,24,.1);border-radius:12px;\">\n            <div style=\"flex:none;width:46px;height:46px;border-radius:50%;background:oklch(0.94 0.03 25);color:oklch(0.42 0.11 25);font-family:'Spectral',serif;font-weight:600;font-size:20px;display:flex;align-items:center;justify-content:center;\">{{ detail.monogram }}<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-family:'Spectral',serif;font-weight:600;font-size:15px;line-height:1.2;color:#211d18;\">{{ detail.person }}<\u002Fdiv>\n              <div style=\"margin-top:2px;font:400 11px/1 'IBM Plex Mono',monospace;color:#a49d90;\">{{ detail.personYears }}<\u002Fdiv>\n              <div style=\"margin-top:8px;font-family:'Spectral',serif;font-weight:400;font-size:13.5px;line-height:1.5;color:#5a554c;\">{{ detail.personBlurb }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- related -->\n          <sc-if value=\"{{ detail.hasRelated }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:26px;display:flex;align-items:center;gap:10px;\">\n            <div style=\"font:600 10.5px/1 'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;color:#8a8378;\">Related Reactions<\u002Fdiv>\n            <div style=\"flex:1;height:1px;background:rgba(33,29,24,.1);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;\">\n            <sc-for list=\"{{ detail.related }}\" as=\"r\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ r.onOpen }}\" style=\"display:flex;align-items:center;gap:7px;cursor:pointer;font-family:'Spectral',serif;font-weight:500;font-size:13.5px;color:#211d18;background:#fff;border:1px solid rgba(33,29,24,.13);padding:8px 12px;border-radius:20px;\" style-active=\"background:rgba(33,29,24,.04);\">\n                <span style=\"width:7px;height:7px;border-radius:50%;background:{{ r.catColor }};\"><\u002Fspan>{{ r.name }}<span style=\"color:oklch(0.55 0.09 25);font-size:14px;margin-top:-1px;\">›<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ FULL-SCREEN SCHEME VIEWER ============ -->\n      <sc-if value=\"{{ showZoom }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;z-index:60;background:#100e0c;display:flex;flex-direction:column;\">\n        <div style=\"flex:none;height:max(env(safe-area-inset-top),14px);\"><\u002Fdiv>\n        <div style=\"flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 12px 8px 18px;\">\n          <div style=\"min-width:0;font-family:'Spectral',serif;font-weight:600;font-size:15.5px;color:#f5f2ea;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ zoom.name }}<\u002Fdiv>\n          <div onclick=\"{{ zoom.onClose }}\" style=\"flex:none;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#f5f2ea;cursor:pointer;\">✕<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ zoom.onToggle }}\" style=\"flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;align-items:{{ zoom.align }};justify-content:center;padding:10px;cursor:{{ zoom.cursor }};\">\n          <img src=\"{{ zoomImgUrl }}\" alt=\"reaction mechanism\" style=\"{{ zoomImgStyle }}\">\n        <\u002Fdiv>\n        <div style=\"flex:none;text-align:center;padding:9px 16px max(env(safe-area-inset-bottom),12px);font:500 10px/1.4 'IBM Plex Mono',monospace;letter-spacing:.03em;color:rgba(245,242,234,.55);\">{{ zoom.hint }}<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { loaded: false, tab: 'directory', exploreView: 'timeline', fgDir: 'from', fgOpen: {}, detailId: null, favorites: {}, brokenSchemes: {}, zoom: null, zoomFit: 'fit', mechAvail: {},\n    quizScope: 'all', quizActive: false, quizQ: null, quizIdx: 0, quizScore: 0, quizStreak: 0, quizPicked: null, quizDone: false, quizBest: 0, quizRoundLog: [] };\n\n  constructor(props) {\n    super(props);\n    this.scrollRef = React.createRef();\n    this.CAT_HUE = {\n      addition: 25, condensation: 70, coupling: 250, oxidation: 305,\n      reduction: 150, rearrangement: 40, substitution: 210,\n      elimination: 350, multicomponent: 285, pericyclic: 135\n    };\n    this.data = [];\n    this.cats = {};\n  }\n\n  componentDidMount() {\n    try {\n      const saved = JSON.parse(localStorage.getItem('nr-favorites') || '{}');\n      if (saved && typeof saved === 'object') this.setState({ favorites: saved });\n    } catch (e) {}\n    try {\n      const best = parseInt(localStorage.getItem('nr-quiz-best') || '0', 10);\n      if (!isNaN(best) && best > 0) this.setState({ quizBest: best });\n    } catch (e) {}\n    const load = (tries) => {\n      const d = window.NR_DATA;\n      if (d && d.reactions) {\n        this.data = d.reactions;\n        this.cats = d.categories || {};\n        this.setState({ loaded: true });\n      } else if (tries > 0) {\n        setTimeout(() => load(tries - 1), 60);\n      }\n    };\n    load(60);\n    // The extension pack (nr-data-ext.js) may merge additional reactions\n    // asynchronously — poll briefly and re-render whenever the count grows.\n    let lastLen = 0, polls = 0;\n    const watch = setInterval(() => {\n      const d = window.NR_DATA;\n      const len = d && d.reactions ? d.reactions.length : 0;\n      if (len && len !== lastLen) { lastLen = len; this.data = d.reactions; this.forceUpdate(); }\n      if (++polls > 40) clearInterval(watch);\n    }, 75);\n  }\n\n  catColor(cat) {\n    const h = this.CAT_HUE[cat] != null ? this.CAT_HUE[cat] : 25;\n    return `oklch(0.48 0.10 ${h})`;\n  }\n  catBg(cat) {\n    const h = this.CAT_HUE[cat] != null ? this.CAT_HUE[cat] : 25;\n    return `oklch(0.95 0.03 ${h})`;\n  }\n  catLabel(cat) { return (this.cats[cat] || cat || '').toString(); }\n\n  openDetail(id) {\n    this.setState({ detailId: id });\n  }\n  closeDetail() { this.setState({ detailId: null }); }\n\n  toggleFav(id) {\n    this.setState((s) => {\n      const f = Object.assign({}, s.favorites);\n      if (f[id]) delete f[id]; else f[id] = true;\n      try { localStorage.setItem('nr-favorites', JSON.stringify(f)); } catch (e) {}\n      return { favorites: f };\n    });\n  }\n\n  jumpTo(letter) {\n    const el = document.getElementById('sec-' + letter);\n    const sc = this.scrollRef.current;\n    if (el && sc) sc.scrollTop = el.offsetTop;\n  }\n\n  setExploreView(v) { this.setState({ exploreView: v }); }\n  setFgDir(d) { this.setState({ fgDir: d, fgOpen: {} }); }\n  toggleFg(name) {\n    this.setState((s) => {\n      const o = Object.assign({}, s.fgOpen);\n      if (o[name]) delete o[name]; else o[name] = true;\n      return { fgOpen: o };\n    });\n  }\n  segStyle(active) {\n    return 'flex:1;text-align:center;padding:9px 6px;border-radius:8px;cursor:pointer;'\n      + \"font:600 12.5px/1 -apple-system,system-ui;letter-spacing:.01em;\"\n      + (active\n          ? 'background:#fff;color:oklch(0.42 0.11 25);box-shadow:0 1px 2px rgba(33,29,24,.12);'\n          : 'background:transparent;color:#8a8378;');\n  }\n  dirStyle(active) {\n    return 'flex:1;text-align:center;padding:9px 6px;border-radius:8px;cursor:pointer;'\n      + \"font:600 11.5px/1.1 -apple-system,system-ui;\"\n      + (active\n          ? 'background:#fff;color:oklch(0.42 0.11 25);box-shadow:0 1px 2px rgba(33,29,24,.12);'\n          : 'background:transparent;color:#8a8378;');\n  }\n\n  // ===================== QUIZ =====================\n  quizPool() {\n    const scope = this.state.quizScope;\n    if (scope === 'all' || !scope) return this.data.slice();\n    return this.data.filter((r) => r.category === scope);\n  }\n  shuffle(arr) {\n    const a = arr.slice();\n    for (let i = a.length - 1; i > 0; i--) {\n      const j = Math.floor(Math.random() * (i + 1));\n      const t = a[i]; a[i] = a[j]; a[j] = t;\n    }\n    return a;\n  }\n  pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }\n\n  makeQuestion() {\n    const pool = this.quizPool();\n    if (pool.length < 4) return null;\n    const all = this.data;\n    const r = this.pick(pool);\n    // choose a template that this reaction can support\n    const templates = ['summary', 'category', 'person', 'year'];\n    if (r.mechanism && r.mechanism.length) templates.push('mechanism');\n    const fg = (window.NR_FG && window.NR_FG.map) ? window.NR_FG.map[r.id] : null;\n    if (fg && fg.from && fg.to) templates.push('transform');\n    const kind = this.pick(templates);\n    const mono = (s) => (s || '?').toString();\n\n    // helper: n distinct wrong options from a value-getter, excluding correct\n    const distractors = (getter, correctVal, n, sourcePool) => {\n      const seen = {}; seen[correctVal] = true;\n      const out = [];\n      const src = this.shuffle(sourcePool || all);\n      for (const x of src) {\n        const v = getter(x);\n        if (v == null || v === '' || seen[v]) continue;\n        seen[v] = true; out.push(v);\n        if (out.length >= n) break;\n      }\n      return out;\n    };\n\n    let q;\n    if (kind === 'summary') {\n      const correct = r.summary;\n      const opts = this.shuffle([correct].concat(distractors((x) => x.summary, correct, 3)));\n      q = { kind, prompt: 'What transformation does the ' + r.name + ' accomplish?', tag: 'Transformation',\n        options: opts, answer: correct, rid: r.id, explain: r.name + ': ' + r.summary };\n    } else if (kind === 'category') {\n      const correct = this.catLabel(r.category);\n      const opts = this.shuffle([correct].concat(distractors((x) => this.catLabel(x.category), correct, 3)));\n      q = { kind, prompt: 'Which class does the ' + r.name + ' belong to?', tag: 'Category',\n        options: opts, answer: correct, rid: r.id, explain: 'The ' + r.name + ' is a ' + correct.toLowerCase() + ' reaction.' };\n    } else if (kind === 'person') {\n      const correct = r.person;\n      const opts = this.shuffle([correct].concat(distractors((x) => x.person, correct, 3)));\n      q = { kind, prompt: 'Who is the ' + r.name + ' named after?', tag: 'Namesake',\n        options: opts, answer: correct, rid: r.id, explain: 'Named after ' + r.person + (r.personYears ? ' (' + r.personYears + ').' : '.') };\n    } else if (kind === 'year') {\n      // \"which came first\" — 4 reactions, pick the earliest\n      const yr = (x) => { const n = parseInt(x.year, 10); return isNaN(n) ? 99999 : n; };\n      const others = this.shuffle(all.filter((x) => x.id !== r.id && yr(x) !== yr(r))).slice(0, 3);\n      const set = this.shuffle([r].concat(others));\n      const earliest = set.slice().sort((a, b) => yr(a) - yr(b))[0];\n      q = { kind, prompt: 'Which of these was discovered first?', tag: 'Timeline',\n        options: set.map((x) => x.name), answer: earliest.name, rid: earliest.id,\n        explain: earliest.name + ' (' + earliest.year + ') came first.' };\n    } else if (kind === 'mechanism') {\n      const correct = r.name;\n      const opts = this.shuffle([correct].concat(distractors((x) => x.name, correct, 3, this.data)));\n      const step = this.pick(r.mechanism);\n      q = { kind, prompt: 'Which reaction includes this mechanistic step?\\n\\u201C' + step + '\\u201D', tag: 'Mechanism',\n        options: opts, answer: correct, rid: r.id, explain: 'This step belongs to the ' + r.name + '.' };\n    } else { // transform\n      const correct = r.name;\n      // distractors: other reactions\n      const opts = this.shuffle([correct].concat(distractors((x) => x.name, correct, 3, this.data)));\n      const fromS = fg.from.join(' / ');\n      const toS = fg.to.join(' / ');\n      q = { kind, prompt: 'Which reaction converts ' + fromS + ' \\u2192 ' + toS + '?', tag: 'Functional groups',\n        options: opts, answer: correct, rid: r.id, explain: r.name + ': ' + fromS + ' \\u2192 ' + toS + '.' };\n    }\n    return q;\n  }\n\n  startQuiz() {\n    const q = this.makeQuestion();\n    this.setState({ quizActive: true, quizDone: false, quizQ: q, quizIdx: 0, quizScore: 0, quizStreak: 0, quizPicked: null, quizRoundLog: [] });\n  }\n  setQuizScope(s) { this.setState({ quizScope: s }); }\n  answerQuiz(opt) {\n    if (this.state.quizPicked != null) return; // already answered\n    const q = this.state.quizQ;\n    const correct = opt === q.answer;\n    this.setState((s) => {\n      const streak = correct ? s.quizStreak + 1 : 0;\n      const score = correct ? s.quizScore + 1 : s.quizScore;\n      const log = s.quizRoundLog.concat([{ correct }]);\n      return { quizPicked: opt, quizScore: score, quizStreak: streak, quizRoundLog: log };\n    });\n  }\n  nextQuiz() {\n    const TOTAL = 10;\n    if (this.state.quizIdx + 1 >= TOTAL) {\n      // finish\n      const finalScore = this.state.quizScore;\n      let best = this.state.quizBest;\n      if (finalScore > best) {\n        best = finalScore;\n        try { localStorage.setItem('nr-quiz-best', String(best)); } catch (e) {}\n      }\n      this.setState({ quizDone: true, quizBest: best });\n      return;\n    }\n    const q = this.makeQuestion();\n    this.setState((s) => ({ quizQ: q, quizIdx: s.quizIdx + 1, quizPicked: null }));\n  }\n  exitQuiz() { this.setState({ quizActive: false, quizDone: false, quizQ: null, quizPicked: null }); }\n  reviewAnswer() { const q = this.state.quizQ; if (q && q.rid) { this.setState({ tab: 'directory', detailId: q.rid, quizActive: false }); } }\n\n  quizScopeStyle(active) {\n    return 'padding:9px 14px;border-radius:999px;cursor:pointer;font:600 12.5px/1 -apple-system,system-ui;white-space:nowrap;'\n      + (active\n          ? 'background:oklch(0.47 0.11 25);color:#fff;'\n          : 'background:#fff;color:#6a655b;border:1px solid rgba(33,29,24,.12);');\n  }\n  quizOptStyle(opt) {\n    const picked = this.state.quizPicked;\n    const q = this.state.quizQ;\n    const base = 'display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:16px 16px;border-radius:14px;cursor:pointer;font-family:\\'Spectral\\',serif;font-weight:500;font-size:15.5px;line-height:1.35;transition:background .15s;';\n    if (picked == null) {\n      return base + 'background:#fff;border:1.5px solid rgba(33,29,24,.12);color:#211d18;';\n    }\n    if (opt === q.answer) {\n      return base + 'background:oklch(0.95 0.06 150);border:1.5px solid oklch(0.6 0.14 150);color:oklch(0.32 0.08 150);';\n    }\n    if (opt === picked) {\n      return base + 'background:oklch(0.95 0.05 25);border:1.5px solid oklch(0.62 0.16 25);color:oklch(0.4 0.12 25);';\n    }\n    return base + 'background:#fff;border:1.5px solid rgba(33,29,24,.09);color:rgba(33,29,24,.4);';\n  }\n  quizOptMark(opt) {\n    const picked = this.state.quizPicked;\n    const q = this.state.quizQ;\n    if (picked == null) return '';\n    if (opt === q.answer) return '✓';\n    if (opt === picked) return '✗';\n    return '';\n  }\n\n  schemeSrc(id) { return 'schemes/' + id + '.png'; }\n  hasSchemeFile(id) { return Component.SCHEME_SET.has(id); }\n  markSchemeBroken(url) {\n    this.setState((s) => {\n      const b = Object.assign({}, s.brokenSchemes);\n      b[url] = true;\n      return { brokenSchemes: b };\n    });\n  }\n  openZoom(r) { this.setState({ zoom: { name: r.name, src: this.schemeSrc(r.id) }, zoomFit: 'fit' }); }\n  closeZoom() { this.setState({ zoom: null }); }\n  toggleZoomFit() { this.setState((s) => ({ zoomFit: s.zoomFit === 'fit' ? 'full' : 'fit' })); }\n\n  vm(r) {\n    const favs = this.state.favorites;\n    const isFav = !!favs[r.id];\n    return {\n      id: r.id,\n      name: r.name,\n      summary: r.summary,\n      year: r.year,\n      catLabel: this.catLabel(r.category),\n      catColor: this.catColor(r.category),\n      catBg: this.catBg(r.category),\n      isFav,\n      favLabel: isFav ? '★' : '☆',\n      starColor: isFav ? 'oklch(0.55 0.13 55)' : 'rgba(33,29,24,.22)',\n      onOpen: () => this.openDetail(r.id),\n      onToggleFav: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.toggleFav(r.id); }\n    };\n  }\n\n  renderVals() {\n    const tab = this.state.tab;\n    const detailId = this.state.detailId;\n\n    // sort alphabetically by name\n    const sorted = this.data.slice().sort((a, b) => a.name.localeCompare(b.name));\n    const vms = sorted.map((r) => this.vm(r));\n\n    // group by first letter\n    const groupMap = {};\n    const order = [];\n    vms.forEach((v) => {\n      const L = v.name.charAt(0).toUpperCase();\n      if (!groupMap[L]) { groupMap[L] = []; order.push(L); }\n      groupMap[L].push(v);\n    });\n    const groups = order.map((L) => ({ letter: L, id: 'sec-' + L, items: groupMap[L] }));\n    const alphabet = order.map((L) => ({ letter: L, onJump: () => this.jumpTo(L) }));\n\n    // favorites\n    const favList = vms.filter((v) => v.isFav);\n    const favCount = favList.length;\n\n    // detail\n    let detail = null;\n    if (detailId) {\n      const r = this.data.find((x) => x.id === detailId);\n      if (r) {\n        const base = this.vm(r);\n        const steps = (r.mechanism || []).map((t, i) => ({ n: i + 1, text: t }));\n        const byId = {};\n        this.data.forEach((x) => { byId[x.id] = x; });\n        const related = (r.related || [])\n          .map((rid) => byId[rid])\n          .filter(Boolean)\n          .map((x) => ({\n            id: x.id,\n            name: x.name,\n            catColor: this.catColor(x.category),\n            onOpen: () => this.openDetail(x.id)\n          }));\n        const schemeUrl = this.schemeSrc(r.id);\n        const schemeBroken = !this.hasSchemeFile(r.id) || !!this.state.brokenSchemes[schemeUrl];\n        detail = Object.assign({}, base, {\n          overview: r.overview,\n          conditions: r.conditions || [],\n          steps,\n          example: r.example,\n          person: r.person,\n          personYears: r.personYears,\n          personBlurb: r.personBlurb,\n          monogram: (r.person || '?').charAt(0),\n          related,\n          hasRelated: related.length > 0,\n          schemeUrl,\n          hasScheme: !schemeBroken,\n          noScheme: schemeBroken,\n          onSchemeError: () => this.markSchemeBroken(schemeUrl),\n          onExpand: () => this.openZoom(r)\n        });\n      }\n    }\n\n    const activeAccent = 'oklch(0.47 0.11 25)';\n    const inactive = 'rgba(33,29,24,.34)';\n\n    // ===== EXPLORE: shared row VM =====\n    const rowVM = (r) => {\n      const v = this.vm(r);\n      v.catColor = this.catColor(r.category);\n      return v;\n    };\n\n    // ===== TIMELINE =====\n    const yearNum = (r) => { const n = parseInt(r.year, 10); return isNaN(n) ? 9999 : n; };\n    const eraDefs = [\n      { title: 'Foundations', range: '1820s–1899', lo: 0, hi: 1899 },\n      { title: 'Classical Era', range: '1900–1949', lo: 1900, hi: 1949 },\n      { title: 'Modern Methods', range: '1950–1979', lo: 1950, hi: 1979 },\n      { title: 'Contemporary', range: '1980–present', lo: 1980, hi: 99999 }\n    ];\n    const byYear = this.data.slice().sort((a, b) => yearNum(a) - yearNum(b) || a.name.localeCompare(b.name));\n    const eras = eraDefs.map((e) => {\n      const items = byYear.filter((r) => { const y = yearNum(r); return y >= e.lo && y <= e.hi; }).map(rowVM);\n      return { title: e.title, range: e.range, count: items.length, items };\n    }).filter((e) => e.count > 0);\n    const yr = byYear.map(yearNum).filter((y) => y < 9999);\n\n    // ===== CATEGORY =====\n    const catMap = {};\n    this.data.forEach((r) => { (catMap[r.category] = catMap[r.category] || []).push(r); });\n    const catGroups = Object.keys(catMap).map((c) => ({\n      id: c,\n      label: this.catLabel(c),\n      color: this.catColor(c),\n      count: catMap[c].length,\n      items: catMap[c].slice().sort((a, b) => a.name.localeCompare(b.name)).map(rowVM)\n    })).sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));\n\n    // ===== FUNCTIONAL GROUPS =====\n    const FG = (typeof window !== 'undefined' && window.NR_FG) ? window.NR_FG : { groups: [], map: {} };\n    const dir = this.state.fgDir;          // 'from' = convert; 'to' = prepare\n    const other = dir === 'from' ? 'to' : 'from';\n    const byId = {};\n    this.data.forEach((x) => { byId[x.id] = x; });\n    const fgHue = {};\n    FG.groups.forEach((g, i) => { fgHue[g] = (i * 41) % 360; });\n    const bucket = {};\n    Object.keys(FG.map).forEach((id) => {\n      const rec = FG.map[id];\n      const r = byId[id];\n      if (!r) return;\n      (rec[dir] || []).forEach((g) => {\n        (bucket[g] = bucket[g] || []).push({\n          name: r.name,\n          onOpen: () => this.openDetail(id),\n          transform: (dir === 'from' ? '→ ' : '← ') + (rec[other] || []).join(' · '),\n          arrowColor: dir === 'from' ? 'oklch(0.5 0.1 150)' : 'oklch(0.5 0.1 250)'\n        });\n      });\n    });\n    const fgList = FG.groups.filter((g) => bucket[g] && bucket[g].length).map((g) => {\n      const open = !!this.state.fgOpen[g];\n      return {\n        name: g,\n        color: `oklch(0.58 0.13 ${fgHue[g] || 25})`,\n        count: bucket[g].length,\n        open,\n        caret: open ? '▾' : '▸',\n        onToggle: () => this.toggleFg(g),\n        items: bucket[g].slice().sort((a, b) => a.name.localeCompare(b.name))\n      };\n    });\n\n    // ===== QUIZ =====\n    const catList = Object.keys(catMap).sort((a, b) => catMap[b].length - catMap[a].length);\n    const quizScopes = [{ id: 'all', label: 'All reactions' }].concat(\n      catList.map((c) => ({ id: c, label: this.catLabel(c) }))\n    ).map((s) => ({\n      label: s.label,\n      onSel: () => this.setQuizScope(s.id),\n      style: this.quizScopeStyle(this.state.quizScope === s.id)\n    }));\n    const qq = this.state.quizQ;\n    const picked = this.state.quizPicked;\n    const answered = picked != null;\n    const isCorrect = answered && qq && picked === qq.answer;\n    const quizOptions = (qq && qq.options ? qq.options : []).map((opt) => ({\n      label: opt,\n      mark: this.quizOptMark(opt),\n      onPick: () => this.answerQuiz(opt),\n      style: this.quizOptStyle(opt)\n    }));\n    const TOTAL = 10;\n    const isLast = this.state.quizIdx + 1 >= TOTAL;\n    const finalScore = this.state.quizScore;\n    let resultTitle = '', resultMsg = '', resultTag = 'Round complete';\n    if (finalScore >= 9) { resultTitle = 'Outstanding!'; resultMsg = 'Near-perfect recall. You clearly know your named reactions.'; }\n    else if (finalScore >= 7) { resultTitle = 'Strong work'; resultMsg = 'A solid grasp of the material — a few more rounds and you\\'ll master it.'; }\n    else if (finalScore >= 5) { resultTitle = 'Good effort'; resultMsg = 'You\\'re getting there. Review the ones you missed and try again.'; }\n    else { resultTitle = 'Keep studying'; resultMsg = 'Plenty of room to grow — explore the reactions, then come back for another round.'; }\n    const resultRingHue = finalScore >= 7 ? 150 : (finalScore >= 5 ? 55 : 25);\n\n    return {\n      loaded: this.state.loaded,\n      total: this.data.length,\n      showDirectory: tab === 'directory',\n      showFavorites: tab === 'favorites',\n      showExplore: tab === 'explore',\n      showQuiz: tab === 'quiz',\n      groups,\n      alphabet,\n      scrollRef: this.scrollRef,\n\n      favList,\n      favCountLabel: favCount === 1 ? '1 saved reaction' : favCount + ' saved reactions',\n      hasFavorites: favCount > 0,\n      noFavorites: favCount === 0,\n\n      showDetail: !!detail,\n      detail: detail || { schemeUrl: '', hasScheme: false, noScheme: false, onSchemeError: () => {}, onExpand: () => {}, conditions: [], steps: [], related: [], hasRelated: false, onToggleFav: () => {} },\n      detailSchemeUrl: detail ? detail.schemeUrl : '',\n      detailSchemeError: detail ? detail.onSchemeError : (() => {}),\n      backLabel: tab === 'favorites' ? 'Favorites' : 'Directory',\n      back: () => this.closeDetail(),\n\n      goDirectory: () => this.setState({ tab: 'directory', detailId: null }),\n      goFavorites: () => this.setState({ tab: 'favorites', detailId: null }),\n      goExplore: () => this.setState({ tab: 'explore', detailId: null }),\n      goQuiz: () => this.setState({ tab: 'quiz', detailId: null }),\n      dirTabColor: tab === 'directory' ? activeAccent : inactive,\n      favTabColor: tab === 'favorites' ? activeAccent : inactive,\n      expTabColor: tab === 'explore' ? activeAccent : inactive,\n      quizTabColor: tab === 'quiz' ? activeAccent : inactive,\n      favTabIcon: tab === 'favorites' ? '★' : '☆',\n\n      // explore: segmented control\n      showTimeline: this.state.exploreView === 'timeline',\n      showCategory: this.state.exploreView === 'category',\n      showGroups: this.state.exploreView === 'groups',\n      segTimeline: { onSel: () => this.setExploreView('timeline'), style: this.segStyle(this.state.exploreView === 'timeline') },\n      segCategory: { onSel: () => this.setExploreView('category'), style: this.segStyle(this.state.exploreView === 'category') },\n      segGroups: { onSel: () => this.setExploreView('groups'), style: this.segStyle(this.state.exploreView === 'groups') },\n\n      // explore: timeline\n      eras,\n      yearMin: yr.length ? Math.min.apply(null, yr) : '',\n      yearMax: yr.length ? Math.max.apply(null, yr) : '',\n\n      // explore: category\n      catGroups,\n\n      // explore: functional groups\n      fgList,\n      dirFrom: { onSel: () => this.setFgDir('from'), style: this.dirStyle(dir === 'from') },\n      dirTo: { onSel: () => this.setFgDir('to'), style: this.dirStyle(dir === 'to') },\n      fgHint: dir === 'from'\n        ? 'Pick the functional group you start with to see every reaction that transforms it — and what it becomes.'\n        : 'Pick the functional group you want to make to see every route to it — and what you start from.',\n\n      // ===== QUIZ =====\n      quizStart: !this.state.quizActive,\n      quizPlaying: this.state.quizActive && !this.state.quizDone,\n      quizResults: this.state.quizActive && this.state.quizDone,\n      quizScopes,\n      quizBestLabel: this.state.quizBest > 0 ? this.state.quizBest + ' / 10' : 'Not set yet',\n      onStartQuiz: () => this.startQuiz(),\n      onExitQuiz: () => this.exitQuiz(),\n      onNextQuiz: () => this.nextQuiz(),\n      onReviewAnswer: () => this.reviewAnswer(),\n      quizProgressLabel: 'Question ' + (this.state.quizIdx + 1) + ' of ' + TOTAL,\n      quizProgressPct: Math.round(((this.state.quizIdx + (answered ? 1 : 0)) / TOTAL) * 100) + '%',\n      quizStreak: this.state.quizStreak,\n      quizQTag: qq ? qq.tag : '',\n      quizPrompt: qq ? qq.prompt : '',\n      quizOptions,\n      quizAnswered: answered,\n      quizExplain: qq ? qq.explain : '',\n      quizFbTitle: isCorrect ? '✓ Correct' : '✗ Not quite',\n      quizFbBg: isCorrect ? 'oklch(0.96 0.04 150)' : 'oklch(0.96 0.04 25)',\n      quizFbBorder: isCorrect ? 'oklch(0.8 0.08 150)' : 'oklch(0.82 0.09 25)',\n      quizFbColor: isCorrect ? 'oklch(0.4 0.1 150)' : 'oklch(0.45 0.13 25)',\n      quizNextLabel: isLast ? 'See results' : 'Next question',\n      quizScore: finalScore,\n      quizResultTag: resultTag,\n      quizResultTitle: resultTitle,\n      quizResultMsg: resultMsg,\n      quizResultRing: `oklch(0.5 0.13 ${resultRingHue})`,\n      quizNewBest: this.state.quizDone && finalScore >= this.state.quizBest && finalScore > 0,\n\n      showZoom: !!this.state.zoom,\n      zoomImgUrl: this.state.zoom ? this.state.zoom.src : '',\n      zoomImgError: () => { if (this.state.zoom) { this.markSchemeBroken(this.state.zoom.src); this.closeZoom(); } },\n      zoomImgStyle: this.state.zoom ? (this.state.zoomFit === 'fit'\n        ? 'max-width:100%;max-height:100%;object-fit:contain;display:block;background:#fff;border-radius:6px;'\n        : 'width:220%;max-width:none;height:auto;display:block;background:#fff;border-radius:6px;') : 'display:none;',\n      zoom: (this.state.zoom ? {\n        name: this.state.zoom.name,\n        src: this.state.zoom.src,\n        onClose: () => this.closeZoom(),\n        onToggle: () => this.toggleZoomFit(),\n        onError: () => { this.markSchemeBroken(this.state.zoom.src); this.closeZoom(); },\n        imgStyle: this.state.zoomFit === 'fit'\n          ? 'max-width:100%;max-height:100%;object-fit:contain;display:block;background:#fff;border-radius:6px;'\n          : 'width:220%;max-width:none;height:auto;display:block;background:#fff;border-radius:6px;',\n        align: this.state.zoomFit === 'fit' ? 'center' : 'flex-start',\n        cursor: this.state.zoomFit === 'fit' ? 'zoom-in' : 'zoom-out',\n        hint: this.state.zoomFit === 'fit' ? 'Tap image to zoom in · scroll to pan' : 'Tap image to fit screen'\n      } : { name: '', src: '', onClose: () => {}, onToggle: () => {}, onError: () => {}, imgStyle: 'display:none;', align: 'center', cursor: 'default', hint: '' })\n    };\n  }\n}\nComponent.SCHEME_SET = new Set([\"acyloin\",\"aldol\",\"arbuzov\",\"arndt-eistert\",\"baeyer-villiger\",\"bamford-stevens\",\"barton-mccombie\",\"baylis-hillman\",\"baylis-hillman-classic\",\"beckmann\",\"benzilic\",\"benzoin\",\"bergman\",\"birch\",\"bischler-napieralski\",\"brook\",\"buchner\",\"cbs\",\"chugaev\",\"claisen-cond\",\"claisen-rearr\",\"clemmensen\",\"cope-rearr\",\"corey-fuchs\",\"corey-kim\",\"corey-winter\",\"criegee\",\"curtius\",\"danheiser\",\"darzens\",\"de-mayo\",\"dess-martin\",\"dieckmann\",\"diels-alder\",\"eglinton\",\"ene\",\"eschenmoser-tanabe\",\"evans-tishchenko\",\"favorskii\",\"finkelstein\",\"fischer-indole\",\"fleming-tamao\",\"friedel-crafts-acyl\",\"friedel-crafts-alkyl\",\"gabriel\",\"glaser\",\"grignard\",\"grob\",\"heck\",\"henry\",\"hofmann-rearr\",\"hwe\",\"hydroboration\",\"ireland-claisen\",\"jacobsen\",\"johnson-claisen\",\"julia-lythgoe\",\"knoevenagel\",\"kornblum-delamare\",\"krapcho\",\"kumada\",\"luche\",\"mannich\",\"michael\",\"mislow-evans\",\"mitsunobu\",\"mizoroki-heck\",\"mpv\",\"mukaiyama\",\"nef\",\"negishi\",\"nicholas\",\"norrish\",\"oppenauer\",\"overman\",\"oxy-cope\",\"paterno-buchi\",\"pauson-khand\",\"payne\",\"peterson\",\"pfitzner-moffatt\",\"pictet-spengler\",\"pinacol\",\"prins\",\"pummerer\",\"ramirez\",\"reformatsky\",\"riley\",\"ritter\",\"robinson\",\"rosenmund\",\"rubottom\",\"saegusa\",\"sakurai\",\"schmidt\",\"semipinacol\",\"shapiro\",\"sharpless-dihydrox\",\"sharpless-epox\",\"simmons-smith\",\"sonogashira\",\"staudinger\",\"stetter\",\"stille\",\"stork-enamine\",\"strecker\",\"suzuki\",\"swern\",\"takai\",\"tebbe\",\"tsuji-trost\",\"vilsmeier\",\"wacker\",\"wagner-meerwein\",\"wharton\",\"williamson\",\"wittig\",\"wittig-rearr\",\"wolff\",\"wolff-kishner\"]);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
